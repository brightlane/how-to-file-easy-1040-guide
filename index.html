<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professor Owl Tax Classroom</title>
    <style>
        :root {
            --bg: #0b1220;
            --panel: #111827;
            --board: #14532d;
            --board2: #0f3d22;
            --green: #22c55e;
            --text: #fff;
            --muted: #cbd5e1;
            --link: #93c5fd;
            --accent: #f59e0b;
        }

        * { box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow-x: hidden;
        }

        /* PROGRESS BAR */
        #progress-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: transparent;
            z-index: 1001;
        }
        #progress-bar {
            height: 100%;
            background: var(--green);
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--green);
        }

        /* STICKY HEADER */
        .header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(17, 24, 39, 0.98);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid var(--green);
        }

        .header-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 12px 20px;
        }

        .brand-link {
            display: flex;
            align-items: center;
            gap: 12px;
            text-decoration: none;
            color: inherit;
        }

        .brand-link img {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid var(--green);
        }

        /* HERO & OWL */
        .hero {
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }

        .owl-img {
            width: 150px;
            height: 150px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            animation: breathe 3s ease-in-out infinite;
        }

        @keyframes breathe {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .speech-bubble {
            background: var(--panel);
            border-radius: 15px;
            padding: 20px;
            margin-top: 25px;
            border-left: 5px solid var(--green);
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-style: italic;
        }

        /* BLACKBOARD SYSTEM */
        .blackboard-container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .blackboard {
            background: linear-gradient(135deg, var(--board), var(--board2));
            border: 10px solid #2d2d2d;
            border-radius: 8px;
            padding: 50px 40px;
            box-shadow: inset 0 0 40px rgba(0,0,0,0.8);
            min-height: 300px;
            transition: opacity 0.2s ease;
        }

        .chalk-title {
            font-family: 'Courier New', monospace;
            color: var(--green);
            font-size: 2rem;
            margin-bottom: 15px;
        }

        .chalk-text {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            color: #fff;
            line-height: 1.4;
        }

        /* CONTROLS */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 40px 20px;
        }

        .btn {
            padding: 15px 35px;
            border-radius: 10px;
            font-weight: 800;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
        }

        .btn-next { background: var(--green); color: #000; }
        .btn-back { background: #374151; color: #fff; }

        /* GRID & FOOTER */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .card {
            background: var(--panel);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #1f2937;
            position: relative;
            overflow: hidden;
        }

        .card.locked::after {
            content: 'COMING SOON';
            position: absolute;
            top: 15px;
            right: -30px;
            background: var(--accent);
            color: #000;
            padding: 5px 40px;
            transform: rotate(35deg);
            font-size: 10px;
            font-weight: 900;
        }

        .footer {
            padding: 60px 20px;
            text-align: center;
            background: #090e1a;
            border-top: 1px solid #1f2937;
        }

        @media (max-width: 600px) {
            .btn { width: 100%; }
            .controls { flex-direction: column; }
            .blackboard { padding: 30px 20px; }
        }
    </style>
</head>
<body>

    <div id="progress-container"><div id="progress-bar"></div></div>

    <header class="header">
        <div class="header-inner">
            <a href="https://www.linkconnector.com/ta.php?lc=007949054186005142&atid=ProfessorOwlTaxGuide" class="brand-link">
                <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Cute_Barn_Owl.jpg" alt="Professor Owl">
                <span>Professor Owl Classroom</span>
            </a>
            <div style="font-size: 12px; color: var(--green); font-weight: 800;">LIVE LESSON MODE</div>
        </div>
    </header>

    <main>
        <section class="hero">
            <img src="https://upload.wikimedia.org/wikipedia/commons/3/3a/Cute_Barn_Owl.jpg" id="owl" class="owl-img" alt="Owl">
            <div class="speech-bubble" id="speech">Welcome! Let's get started.</div>
        </section>

        <section class="blackboard-container">
            <div class="blackboard" id="bb-inner">
                <div class="chalk-title" id="title"></div>
                <div class="chalk-text" id="text"></div>
            </div>
        </section>

        <div class="controls">
            <button class="btn btn-back" onclick="prev()">Back</button>
            <button class="btn btn-next" onclick="next()">Next Lesson</button>
        </div>

        <section id="schedule" class="grid">
            <div class="card locked"><h3>Schedule 1</h3><p>Additional Income</p></div>
            <div class="card locked"><h3>Schedule 2</h3><p>Additional Taxes</p></div>
            <div class="card locked"><h3>Schedule 3</h3><p>Payments/Credits</p></div>
        </section>

        <div class="footer">
            <a href="https://www.linkconnector.com/ta.php?lc=007949054186005142&atid=ProfessorOwlTaxGuide" class="btn btn-next" style="text-decoration:none; display:inline-block;">Final Step: Start Filing</a>
            <p style="margin-top:20px; opacity:0.5;">© 2026 Professor Owl Tax Guide · Affiliate Disclosure Included</p>
        </div>
    </main>

    <script>
        const lessons = [
            ["Line 1: Identity", "Your tax file begins with your legal name and SSN. Accurate identity ensures your refund goes to YOU."],
            ["Line 2: Filing Status", "Single, Married, or Head of Household? This choice dictates your tax brackets for the entire year."],
            ["Line 3-7: The Income Engine", "From wages to interest, this is where your total earnings are tallied before any deductions."],
            ["Line 8-12: Standard Deduction", "The IRS allows a set amount of income to be tax-free. Most people use this to lower their bill instantly."],
            ["Line 15: Taxable Income", "The 'Magic Number.' This is what remains after deductions and what your tax is actually based on."],
            ["Line 24: Total Tax", "This is the final calculation of what you owe before we look at what you've already paid."],
            ["Line 25-33: Payments & Refunds", "If your withholdings exceed your tax, you get a refund. This is the goal of the classroom!"]
        ];

        let current = 0;

        function update() {
            const [t, txt] = lessons[current];
            const bb = document.getElementById('bb-inner');
            
            // Fade effect
            bb.style.opacity = 0;
            
            setTimeout(() => {
                document.getElementById('title').innerText = t;
                document.getElementById('text').innerText = txt;
                document.getElementById('speech').innerText = `"Professor Owl says: ${txt}"`;
                
                // Progress bar logic
                const percent = ((current + 1) / lessons.length) * 100;
                document.getElementById('progress-bar').style.width = percent + "%";
                
                bb.style.opacity = 1;
            }, 200);
        }

        function next() { if(current < lessons.length - 1) { current++; update(); } }
        function prev() { if(current > 0) { current--; update(); } }

        update();
    </script>
    <img src="https://www.linkconnector.com/tr.php?lc=007949054186005142&atid=ProfessorOwlTaxGuide&tb=1" width="1" height="1" style="display:none;">
</body>
</html>
