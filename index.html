<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Professor Owl Attention Classroom</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0b1220;
  color: white;
}

/* ================= HEADER ================= */
.header {
  position: sticky;
  top: 0;
  z-index: 999;
  background: #111827;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 12px 18px;
  border-bottom: 2px solid #22c55e;
}

.header a {
  color: white;
  text-decoration: none;
}

.logo {
  font-weight: bold;
  font-size: 18px;
}

.nav a {
  margin-left: 12px;
  font-size: 13px;
  color: #93c5fd;
}

/* ================= HERO ================= */
.hero {
  text-align: center;
  padding: 30px 15px;
}

.owl {
  font-size: 80px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.hero h1 {
  margin: 10px 0;
}

/* ================= BOARD ================= */
.board {
  max-width: 900px;
  margin: 20px auto;
  background: #14532d;
  border-radius: 10px;
  padding: 20px;
  border: 3px solid #22c55e;
  min-height: 120px;
  transition: all 0.3s ease;
}

/* ================= CONTROLS ================= */
.controls {
  text-align: center;
  margin: 15px;
}

button {
  background: #22c55e;
  border: none;
  padding: 10px 16px;
  margin: 5px;
  border-radius: 6px;
  font-weight: bold;
  cursor: pointer;
}

button:hover {
  background: #16a34a;
}

/* ================= LESSON BOX ================= */
.lesson-title {
  font-size: 18px;
  font-weight: bold;
  margin-bottom: 10px;
}

.lesson-text {
  font-size: 14px;
  color: #d1fae5;
  line-height: 1.4;
}

/* ================= FOOTER CTA ================= */
.cta {
  text-align: center;
  margin: 30px;
}

.cta a {
  background: #22c55e;
  padding: 12px 18px;
  border-radius: 8px;
  color: black;
  text-decoration: none;
  font-weight: bold;
}
</style>
</head>

<body>

<!-- ================= HEADER ================= -->
<div class="header">
  <a class="logo" href="https://www.linkconnector.com/ta.php?lc=007949054186005142&atid=ProfessorOwlTaxGuide">
    🦉 Professor Owl Classroom
  </a>

  <div class="nav">
    <a href="#lesson">Lesson</a>
    <a href="#board">Board</a>
  </div>
</div>

<!-- ================= HERO ================= -->
<div class="hero">
  <div class="owl">🦉</div>
  <h1>Interactive Learning Classroom</h1>
  <p>Learn step-by-step concepts with Professor Owl</p>
</div>

<!-- ================= BOARD ================= -->
<div class="board" id="board">
  <div class="lesson-title" id="title">Welcome</div>
  <div class="lesson-text" id="text">Press "Next" to begin your learning journey.</div>
</div>

<!-- ================= CONTROLS ================= -->
<div class="controls">
  <button onclick="prevLesson()">⬅ Back</button>
  <button onclick="nextLesson()">Next ➡</button>
</div>

<!-- ================= CTA ================= -->
<div class="cta">
  <a href="https://www.linkconnector.com/ta.php?lc=007949054186005142&atid=ProfessorOwlTaxGuide">
    Visit Official Resource
  </a>
</div>

<script>
const lessons = [
  ["Identity Basics", "Understanding who the tax system applies to."],
  ["Filing Overview", "Why people file yearly financial reports."],
  ["Income Concept", "Money earned from work or other sources."],
  ["Multiple Income Sources", "Different ways income can be earned."],
  ["Income Summary", "Combining all income into one total idea."],
  ["Adjustment Concept", "Why income may be adjusted before calculation."],
  ["Fairness Principle", "Tax systems aim for fairness in treatment."],
  ["Deduction Idea", "Ways income may be reduced conceptually."],
  ["Standard vs Options", "Different methods of reducing taxable amount."],
  ["Taxable Income", "Income that is considered for taxation."],
  ["System Activation", "Where tax rules begin applying."],
  ["Progressive Structure", "Higher income may be taxed differently."],
  ["Calculation Flow", "How tax systems process numbers."],
  ["Preliminary Result", "Early tax estimate before final steps."],
  ["Adjustment Layer", "Refinements to calculated tax."],
  ["Credit Concept", "Direct reductions to tax owed."],
  ["Refund Idea", "When payments exceed obligations."],
  ["Payment System", "Money paid during the year."],
  ["Withholding Concept", "Automatic tax payments from income."],
  ["Tracking System", "Keeping record of payments."],
  ["Comparison Stage", "Matching owed vs paid amounts."],
  ["Refund Outcome", "Money returned if overpaid."],
  ["Balance Due", "Money still owed if underpaid."],
  ["Accuracy Importance", "Why correct data matters."],
  ["Verification System", "Cross-checking financial records."],
  ["Correction Stage", "Fixing errors if found."],
  ["Validation Step", "Confirming accuracy of return."],
  ["Submission", "Sending data for processing."],
  ["Processing", "System reviews information."],
  ["Review Stage", "Checking for issues."],
  ["Error Detection", "Finding inconsistencies."],
  ["Correction Review", "Fixing flagged issues."],
  ["Approval Stage", "Accepting valid returns."],
  ["Final Result", "Outcome of tax calculation."],
  ["Record Storage", "Keeping historical data."],
  ["Audit Concept", "Possible deeper review."],
  ["Completion", "Process finished."],
  ["Big Picture", "Taxes as a system of fairness and order."]
];

let current = 0;

function renderLesson() {
  document.getElementById("title").innerText = lessons[current][0];
  document.getElementById("text").innerText = lessons[current][1];
}

function nextLesson() {
  if (current < lessons.length - 1) {
    current++;
    renderLesson();
  }
}

function prevLesson() {
  if (current > 0) {
    current--;
    renderLesson();
  }
}

renderLesson();
</script>

</body>
</html>
